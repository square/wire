syntax = "proto3";

import "google/protobuf/struct.proto";

message MessageContainingStruct {
  google.protobuf.Struct some_struct = 1;
  google.protobuf.Value some_value = 2;
  google.protobuf.ListValue some_list = 3;
  google.protobuf.NullValue some_null = 4;
}
