syntax = "proto3";

package squareup.proto3.kotlin.sealed.interop.buildersonly;

message InteropSealedOneOfBuildersOnly {
  oneof second_method {
    bytes e = 7;
    sint32 f = 6;
    SealedMessage g = 5;
  }
  string h = 8;
  oneof first_method {
    string a = 3 [json_name = "sayMyName"];
    int32 b = 2;
    bool c = 1;
    int64 d = 4;
  }

  message SealedMessage {
    string content = 1;
  }
}
